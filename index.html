<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCF Calculator</title>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f121a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: #1a1f2b; 
            padding: 30px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 360px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #2d3441;
        }
        h2 { 
            text-align: center; 
            color: #00ffcc; /* Cyan/Green color from screen */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-size: 20px;
        }
        .input-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #8b949e; 
            font-size: 12px; 
            font-weight: bold;
            text-transform: uppercase;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #2d3441; 
            border-radius: 8px; 
            background-color: #232936; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
        }
        input:focus { outline: 1px solid #00ffcc; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, #00d2ff, #3a7bd5); /* Gradient as per modern UI */
            background: #00ffcc; /* Solid color from screenshot */
            border: none; 
            border-radius: 8px; 
            color: #000; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
        }
        
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: #1a1f2b; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid #00ffcc33;
        }
        .result-label { 
            color: #00ffcc; 
            font-size: 12px; 
            letter-spacing: 1px; 
            margin-bottom: 10px;
            display: block;
        }
        #fairValue { 
            font-size: 32px; 
            font-weight: bold; 
            color: #ffffff; 
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DCF Calculator</h2>
    
    <div class="input-group">
        <label>Expected Cash Flow</label>
        <input type="number" id="cashflow" placeholder="FCFF">
    </div>

    <div class="input-group">
        <label>Discount Rate (%)</label>
        <input type="number" id="wacc" placeholder="WACC">
    </div>

    <div class="input-group">
        <label>Growth Rate (%)</label>
        <input type="number" id="growth" placeholder="10">
    </div>

    <div class="input-group">
        <label>Years</label>
        <input type="number" id="years" placeholder="5">
    </div>

    <button onclick="calculateDCF()">Calculate</button>

    <div class="result-box">
        <span class="result-label">FAIR VALUE RESULT</span>
        <div id="fairValue">0.00</div>
    </div>
</div>

<script>
    function calculateDCF() {
        const CF = parseFloat(document.getElementById('cashflow').value);
        const r = parseFloat(document.getElementById('wacc').value) / 100;
        const g = parseFloat(document.getElementById('growth').value) / 100;
        const n = parseInt(document.getElementById('years').value);

        if (isNaN(CF) || isNaN(r) || isNaN(g) || isNaN(n)) {
            alert("कृपया सही वैल्यू डालें");
            return;
        }

        const terminalValue = (CF * Math.pow(1 + g, n) * (1 + g)) / (r - g);
        let pvCashFlows = 0;
        for (let i = 1; i <= n; i++) {
            pvCashFlows += (CF * Math.pow(1 + g, i)) / Math.pow(1 + r, i);
        }
        const pvTerminalValue = terminalValue / Math.pow(1 + r, n);
        const totalFairValue = pvCashFlows + pvTerminalValue;

        document.getElementById('fairValue').innerText = totalFairValue.toLocaleString('en-IN', {
            maximumFractionDigits: 2
        });
    }
</script>

</body>
</html>
